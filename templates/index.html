<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HenAi - Core Modes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-hover: #222222;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border: #262626;
            --border-hover: #404040;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            line-height: 1.5;
            padding: 12px;
        }

        .henai-app {
            max-width: 1600px;
            width: 100%;
            height: 95vh;
            background: var(--bg-secondary);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-primary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: 0;
            opacity: 0;
            overflow: hidden;
        }

        .brand {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .mode-btn {
            margin: 16px;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        .mode-btn.active-mode {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }

        .chats-section {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .chat-item {
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--border);
        }

        .chat-item.active {
            background: var(--accent-glow);
            border-color: var(--accent);
        }

        .chat-title {
            font-size: 0.8125rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
        }

        .chat-item:hover .chat-actions {
            opacity: 1;
        }

        .chat-action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--text-muted);
        }

        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8125rem;
            cursor: pointer;
        }

        /* Main area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            min-width: 0;
        }

        .top-bar {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 20px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Message Styles */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 0.2s ease;
        }
        .message.user { justify-content: flex-end; }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }
        .message-content {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.9375rem;
        }
        .message.user .message-content {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message.assistant .message-content {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }
        .message-header { font-size: 0.8125rem; font-weight: 600; margin-bottom: 6px; }
        .message-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message:hover .message-actions { opacity: 1; }
        .action-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        textarea {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            min-height: 50px;
            font-size: 0.9375rem;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .send-btn {
            background: var(--accent);
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-attachments-area {
            max-width: 900px;
            margin: 10px auto 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .attachment-pill {
            background: var(--bg-tertiary);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .code-block-wrapper {
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #1e1e1e;
        }
        .code-block-header {
            display: flex;
            justify-content: space-between;
            background: #2d2d30;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .copy-code-btn, .download-code-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-tertiary);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            z-index: 2000;
            font-size: 0.875rem;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Docs & Search specific */
        .docs-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
        }
        .docs-tool-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .docs-tool-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent);
        }
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .template-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .template-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            background: var(--bg-hover);
        }
        .template-icon { font-size: 2rem; margin-bottom: 12px; }
        .template-title { font-weight: 600; margin-bottom: 6px; }
        .template-description { font-size: 0.8rem; color: var(--text-muted); }
        .docs-form {
            background: var(--bg-tertiary);
            border-radius: 24px;
            padding: 24px;
        }
        .docs-form-input, .docs-form-textarea {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-primary);
            margin: 8px 0;
        }
        .archive-result {
            background: var(--bg-tertiary);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .archive-result-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
        }
        .archive-download-btn {
            background: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .search-mode-indicator {
            background: var(--accent-glow);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .file-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        @media (max-width: 768px) {
            .sidebar { width: 240px; }
            .message-content { max-width: 90%; }
            .template-grid { grid-template-columns: 1fr; }
            .docs-toolbar { justify-content: center; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>
<div class="henai-app">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><h1>HenAi</h1><p>Core Modes</p></div>
        <div class="mode-btn" id="chatModeBtn">💬 Chat Mode</div>
        <div class="mode-btn" id="docsModeBtn">📄 Documents Mode</div>
        <div class="mode-btn" id="searchModeBtn">🔍 Search Files Mode</div>
        <div class="chats-section"><div id="chatList"></div></div>
        <div class="sidebar-footer" id="settingsFooter">Settings & Help</div>
    </aside>
    <div class="main-area">
        <div class="top-bar">
            <button class="panel-toggle" id="panelToggleBtn"><i class="fas fa-columns"></i></button>
            <div class="status-badge" id="modeStatus">HenAi Ready</div>
        </div>
        <div class="chat-container" id="chatContainer"><div class="empty-state"><div class="empty-state-icon">✨</div><div>Select a mode to start</div></div></div>
        <div class="input-area">
            <div class="input-wrapper">
                <button class="file-btn" id="fileBtn" style="display: none;">📎</button>
                <textarea id="messageInput" placeholder="Message HenAi" rows="2"></textarea>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
            <div class="file-attachments-area" id="attachmentsArea"></div>
            <input type="file" id="fileInput" style="display: none;" multiple>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
<script>
    // -------- GLOBAL STATE ----------
    let currentMode = 'chat'; // chat, docs, search
    let currentConversationId = null;
    let pendingAttachments = [];
    let isSending = false;
    let unifiedSearchResults = [];
    let currentDocsTemplate = null;
    let currentDocType = null;

    // Helper functions
    function showToast(msg) {
        let t = document.querySelector('.toast');
        if(t) t.remove();
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(), 2500);
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatFileSize(bytes) { if(bytes===0) return '0 B'; let k=1024, sizes=['B','KB','MB','GB'], i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(2))+' '+sizes[i]; }

    // ---------- CHAT MODE (full API simulation) ----------
    let conversations = [{ id: 'conv1', title: 'Welcome', messages: [{role:'assistant', content:'Hello! I am HenAi. Ask me anything.'}], message_count:1 }];
    let currentVersions = {};

    function loadConversations() {
        let container = document.getElementById('chatList');
        container.innerHTML = conversations.map(conv => `<div class="chat-item ${currentConversationId===conv.id?'active':''}" onclick="loadConversation('${conv.id}')"><div class="chat-title">${escapeHtml(conv.title)}</div><div class="chat-actions"><button class="chat-action-btn" onclick="event.stopPropagation(); deleteConversation('${conv.id}')">🗑️</button></div></div>`).join('');
        if(conversations.length===0) container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">No chats</div>';
    }
    window.deleteConversation = function(id) {
        conversations = conversations.filter(c=>c.id!==id);
        if(currentConversationId===id) newChat();
        loadConversations();
        showToast('Conversation deleted');
    };
    function newChat() {
        currentConversationId = null;
        pendingAttachments = [];
        updateAttachmentsUI();
        document.getElementById('chatContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><div>Start a new conversation</div></div>`;
        loadConversations();
    }
    async function loadConversation(id) {
        let conv = conversations.find(c=>c.id===id);
        if(!conv) return;
        currentConversationId = id;
        let chatDiv = document.getElementById('chatContainer');
        chatDiv.innerHTML = '';
        for(let i=0; i<conv.messages.length; i++) {
            let msg = conv.messages[i];
            let html = `<div class="message ${msg.role}"><div class="message-avatar">${msg.role==='user'?'👤':'🤖'}</div><div class="message-content"><div class="message-header">${msg.role==='user'?'You':'HenAi'}</div><div id="msg-${i}"></div><div class="message-actions">${msg.role==='user'?`<button class="action-btn" onclick="editMessage(${i})">Edit</button>`:`<button class="action-btn" onclick="copyMessage(${i})">Copy</button><button class="action-btn" onclick="regenerateMessage(${i})">Regenerate</button>`}</div></div></div>`;
            chatDiv.innerHTML += html;
        }
        for(let i=0; i<conv.messages.length; i++) {
            let el = document.getElementById(`msg-${i}`);
            if(el) el.innerText = conv.messages[i].content;
        }
        scrollToBottom();
        loadConversations();
    }
    window.editMessage = async function(idx) { showToast('Edit feature active'); };
    window.copyMessage = function(idx) { let msg = conversations.find(c=>c.id===currentConversationId)?.messages[idx]?.content; if(msg){ navigator.clipboard.writeText(msg); showToast('Copied!'); } };
    window.regenerateMessage = async function(idx) { showToast('Regenerate simulation'); };
    function scrollToBottom() { let c=document.getElementById('chatContainer'); c.scrollTop=c.scrollHeight; }
    function updateAttachmentsUI() { let area=document.getElementById('attachmentsArea'); let btn=document.getElementById('fileBtn'); area.innerHTML = pendingAttachments.map((f,i)=>`<div class="attachment-pill">📎 ${escapeHtml(f.name)} <button onclick="removeAttachment(${i})">✕</button></div>`).join(''); btn.style.display = pendingAttachments.length ? 'flex' : 'none'; }
    window.removeAttachment = function(i) { pendingAttachments.splice(i,1); updateAttachmentsUI(); };
    async function sendChatMessage() {
        let input = document.getElementById('messageInput');
        let msg = input.value.trim();
        if(!msg && pendingAttachments.length===0) return;
        isSending = true; let btn=document.getElementById('sendBtn'); btn.disabled=true; btn.innerText='...';
        if(!currentConversationId) {
            let newId = 'conv'+Date.now();
            conversations.unshift({ id:newId, title: msg.slice(0,30), messages: [], message_count:0 });
            currentConversationId = newId;
        }
        let conv = conversations.find(c=>c.id===currentConversationId);
        conv.messages.push({ role:'user', content: msg, attachments: [...pendingAttachments] });
        pendingAttachments = []; updateAttachmentsUI();
        let chatDiv = document.getElementById('chatContainer');
        let idx = conv.messages.length-1;
        chatDiv.innerHTML += `<div class="message user"><div class="message-avatar">👤</div><div class="message-content"><div class="message-header">You</div><div id="msg-${idx}">${escapeHtml(msg)}</div><div class="message-actions"><button class="action-btn" onclick="editMessage(${idx})">Edit</button></div></div></div>`;
        let typingId = 'typing'+Date.now();
        chatDiv.innerHTML += `<div class="message assistant" id="${typingId}"><div class="message-avatar">🤖</div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
        scrollToBottom();
        // simulate AI response
        setTimeout(()=>{
            let fakeResp = `I received: "${msg}". I'm a simple assistant in this demo. Upload files or ask anything.`;
            conv.messages.push({ role:'assistant', content: fakeResp });
            let respIdx = conv.messages.length-1;
            document.getElementById(typingId)?.remove();
            chatDiv.innerHTML += `<div class="message assistant"><div class="message-avatar">🤖</div><div class="message-content"><div class="message-header">HenAi</div><div id="msg-${respIdx}">${escapeHtml(fakeResp)}</div><div class="message-actions"><button class="action-btn" onclick="copyMessage(${respIdx})">Copy</button><button class="action-btn" onclick="regenerateMessage(${respIdx})">Regenerate</button></div></div></div>`;
            scrollToBottom();
            loadConversations();
            isSending=false; btn.disabled=false; btn.innerText='Send';
        }, 800);
        input.value = '';
    }

    // ---------- DOCUMENTS MODE ----------
    const DOCS_TEMPLATES = {
        word: [{ id:'report', title:'Business Report', icon:'📊', desc:'Professional report' }],
        txt: [{ id:'notes', title:'Plain Notes', icon:'📝', desc:'Simple text' }],
        pdf: [{ id:'invoice', title:'Invoice', icon:'💰', desc:'PDF invoice' }],
        excel: [{ id:'budget', title:'Budget', icon:'📊', desc:'Spreadsheet' }]
    };
    function enterDocsMode() {
        currentMode = 'docs';
        document.getElementById('modeStatus').innerHTML = '📄 Documents Mode';
        document.getElementById('chatContainer').innerHTML = `<div class="docs-container"><div class="docs-toolbar"><button class="docs-tool-btn" onclick="showCreateDocs()"><i class="fas fa-plus"></i> Create</button><button class="docs-tool-btn" onclick="showExtractDocs()"><i class="fas fa-file-export"></i> Extract</button></div><div id="docsContentArea"><div class="empty-state">Select Create or Extract</div></div></div>`;
        document.getElementById('messageInput').placeholder = 'Describe document content...';
        document.getElementById('fileBtn').style.display = 'none';
    }
    window.showCreateDocs = function() {
        let area = document.getElementById('docsContentArea');
        area.innerHTML = `<div class="docs-form"><h3>Create Document</h3><div class="template-grid">${Object.entries(DOCS_TEMPLATES).map(([type, temps])=>temps.map(t=>`<div class="template-card" onclick="selectDocTemplate('${type}','${t.id}','${t.title}')"><div class="template-icon">${t.icon}</div><div class="template-title">${t.title}</div><div class="template-description">${t.desc}</div></div>`).join('')).join('')}</div></div>`;
    };
    window.selectDocTemplate = function(type, id, title) {
        currentDocType = type;
        currentDocsTemplate = { docType:type, templateId:id, title:title };
        showToast(`Selected ${title}. Type your content and click Send.`);
        document.getElementById('messageInput').focus();
    };
    window.showExtractDocs = function() {
        let area = document.getElementById('docsContentArea');
        area.innerHTML = `<div class="docs-form"><h3>Extract from Document</h3><input type="file" id="extractFileInput" class="docs-form-input"><button class="docs-tool-btn" style="margin-top:16px" onclick="extractDocument()">Extract Text</button></div>`;
    };
    window.extractDocument = async function() {
        let fileInput = document.getElementById('extractFileInput');
        if(!fileInput.files.length) { showToast('Select a file'); return; }
        let file = fileInput.files[0];
        let reader = new FileReader();
        reader.onload = function(e) {
            let content = e.target.result.slice(0, 2000);
            showToast('Extraction complete');
            document.getElementById('docsContentArea').innerHTML = `<div class="archive-result"><div class="archive-result-title">Extracted Text</div><pre style="white-space:pre-wrap">${escapeHtml(content)}</pre></div>`;
        };
        reader.readAsText(file);
    };
    async function generateDocument() {
        let userPrompt = document.getElementById('messageInput').value.trim();
        if(!userPrompt && !currentDocsTemplate) { showToast('Describe your document'); return; }
        if(!currentDocsTemplate) { showToast('Select a template first'); return; }
        showToast(`Generating ${currentDocsTemplate.title}...`);
        let fakeContent = `Generated ${currentDocsTemplate.title}\nBased on: ${userPrompt}\nThis is a sample document. In full version, AI would create proper content.`;
        let blob = new Blob([fakeContent], {type:'text/plain'});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a'); a.href=url; a.download=`${currentDocsTemplate.title}.txt`; a.click();
        URL.revokeObjectURL(url);
        showToast('Document generated!');
    }

    // ---------- SEARCH FILES MODE (Unified Archive Search) ----------
    async function searchUnifiedArchives(query) {
        let results = [];
        try {
            let zenodo = await fetch(`https://zenodo.org/api/records?q=${encodeURIComponent(query)}&size=3`);
            let zdata = await zenodo.json();
            (zdata.hits?.hits || []).forEach(r=>{
                results.push({ source:'Zenodo', title: r.metadata.title, description: r.metadata.description, files: r.files?.map(f=>({name:f.key, url:f.links?.self})) || [] });
            });
        } catch(e){}
        try {
            let github = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&per_page=3`);
            let gdata = await github.json();
            (gdata.items || []).forEach(r=>{
                results.push({ source:'GitHub', title: r.full_name, description: r.description, files: [{name:`${r.name}.zip`, url: r.html_url+'/archive/refs/heads/main.zip'}] });
            });
        } catch(e){}
        return results;
    }
    function enterSearchMode() {
        currentMode = 'search';
        document.getElementById('modeStatus').innerHTML = '🔍 Search Files Mode';
        document.getElementById('chatContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔎</div><div>Enter a query to search archives (Zenodo, GitHub)</div></div>`;
        document.getElementById('messageInput').placeholder = 'Search for research, code, or files...';
        document.getElementById('fileBtn').style.display = 'none';
    }
    async function performSearch() {
        let query = document.getElementById('messageInput').value.trim();
        if(!query) return;
        let container = document.getElementById('chatContainer');
        container.innerHTML = `<div class="loading-spinner" style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin"></i> Searching...</div>`;
        let results = await searchUnifiedArchives(query);
        if(results.length===0) {
            container.innerHTML = `<div class="empty-state">No results for "${escapeHtml(query)}"</div>`;
            return;
        }
        let html = `<div class="search-mode-indicator">Results for "${escapeHtml(query)}"</div>`;
        results.forEach(res=>{
            html += `<div class="archive-result"><div class="archive-result-title">${escapeHtml(res.source)}: ${escapeHtml(res.title)}</div><div class="archive-result-description">${escapeHtml(res.description||'No description')}</div>`;
            (res.files||[]).forEach(f=>{
                html += `<div class="file-list-item"><span>📄 ${escapeHtml(f.name)}</span><button class="archive-download-btn" onclick="downloadFile('${f.url}','${escapeHtml(f.name)}')">Download</button></div>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
    }
    window.downloadFile = function(url, name) {
        window.open(url, '_blank');
        showToast(`Opening ${name}`);
    };

    // ---------- MODE ROUTING ----------
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('chatModeBtn').classList.remove('active-mode');
        document.getElementById('docsModeBtn').classList.remove('active-mode');
        document.getElementById('searchModeBtn').classList.remove('active-mode');
        if(mode==='chat') { document.getElementById('chatModeBtn').classList.add('active-mode'); enterChatMode(); }
        else if(mode==='docs') { document.getElementById('docsModeBtn').classList.add('active-mode'); enterDocsMode(); }
        else if(mode==='search') { document.getElementById('searchModeBtn').classList.add('active-mode'); enterSearchMode(); }
    }
    function enterChatMode() {
        currentMode = 'chat';
        document.getElementById('modeStatus').innerHTML = '💬 Chat Mode';
        document.getElementById('messageInput').placeholder = 'Message HenAi';
        document.getElementById('fileBtn').style.display = 'flex';
        if(!currentConversationId) newChat();
        else loadConversation(currentConversationId);
    }
    // Override send based on mode
    window.sendMessage = function() {
        if(currentMode === 'chat') sendChatMessage();
        else if(currentMode === 'docs') generateDocument();
        else if(currentMode === 'search') performSearch();
    };
    document.getElementById('sendBtn').addEventListener('click', ()=>sendMessage());
    document.getElementById('messageInput').addEventListener('keydown', (e)=> { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    document.getElementById('panelToggleBtn').addEventListener('click', ()=>document.getElementById('sidebar').classList.toggle('collapsed'));
    document.getElementById('chatModeBtn').addEventListener('click', ()=>setMode('chat'));
    document.getElementById('docsModeBtn').addEventListener('click', ()=>setMode('docs'));
    document.getElementById('searchModeBtn').addEventListener('click', ()=>setMode('search'));
    document.getElementById('fileBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', async (e)=>{
        for(let file of e.target.files) {
            let text = await file.text();
            pendingAttachments.push({ name: file.name, content: text.slice(0,500) });
        }
        updateAttachmentsUI();
        e.target.value='';
    });
    document.getElementById('settingsFooter').addEventListener('click', ()=>alert('HenAi Core Modes\nChat: conversations, attachments, copy/edit\nDocuments: Create/Extract templates\nSearch: Unified archive search (Zenodo/GitHub)'));
    setMode('chat');
</script>
</body>
</html>
